<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>404 - Track Not Found | 221st Street Publishing</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/animejs/3.2.1/anime.min.js"></script>
    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: #0d0d0d;
            color: #ffffff;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            height: 100vh;
            text-align: center;
            overflow: hidden; /* Keep the boom inside the studio */
        }
        .container {
            max-width: 600px;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        .logo-box {
            position: relative;
            margin-bottom: 40px;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        .pulse-logo {
            width: 220px; /* Base size */
            height: auto;
            position: relative;
            z-index: 10;
        }
        /* The invisible 'shockwave' element that expands from the logo */
        .shockwave {
            position: absolute;
            width: 100%;
            height: 100%;
            border-radius: 50%; /* Assume the logo is circular for this effect */
            border: 2px solid #7C1716;
            opacity: 0;
            z-index: 5;
        }
        h1 {
            font-size: 8rem;
            margin: 0;
            color: #7C1716;
            text-shadow: 0px 4px 20px rgba(124, 23, 22, 0.4);
            line-height: 1;
        }
        h2 {
            font-size: 1.8rem;
            margin-top: 10px;
            letter-spacing: 3px;
            text-transform: uppercase;
        }
        p {
            color: #aaaaaa;
            margin-bottom: 40px;
            line-height: 1.6;
            font-size: 1.1rem;
        }
        .btn {
            display: inline-block;
            padding: 14px 28px;
            background-color: transparent;
            color: #ffffff;
            text-decoration: none;
            border-radius: 4px;
            font-weight: bold;
            transition: all 0.3s ease;
            border: 2px solid #7C1716;
            letter-spacing: 1px;
        }
        .btn:hover {
            background-color: #7C1716;
            box-shadow: 0px 0px 15px rgba(124, 23, 22, 0.5);
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="logo-box">
            <img src="logo.png" alt="221st Street Publishing" class="pulse-logo" onerror="this.src='https://rayazul.com/ai/logo_fallback.png';">
            <div class="shockwave" id="shockwave"></div>
        </div>
        <h1>404</h1>
        <h2>Track Not Found</h2>
        <p>The catalog entry you are looking for has been moved, deleted, or never existed. Let's get you back to the main studio.</p>
        <a href="https://221street.com" class="btn">RETURN TO HOMEPAGE</a>
    </div>

    <script>
        // Setup the physical boom simulation
        function createBoom() {
            // Animation 1: The 'Logo Kick' - simulate the speaker cone moving
            anime({
                targets: '.pulse-logo',
                scale: [
                    { value: 1.15, duration: 100, easing: 'easeOutQuad' }, // Rapid expansion 'Kick'
                    { value: 1.0, duration: 800, easing: 'easeOutElastic(1, .5)' } // Slow spring back
                ],
                // Sync Animation 2: The 'Shockwave' expander
                complete: function() {
                    // Animation 2: The expanding red shockwave ring
                    anime({
                        targets: '#shockwave',
                        scale: [1, 2.5], // Expand to 2.5x size
                        opacity: [0.6, 0], // Start visible red, fade to nothing
                        duration: 700,
                        easing: 'easeOutQuart',
                        // Recalculate a rhythmic 'Rest' time to make it feel organic, like a beat
                        complete: function() {
                            // Calculate a random organic rest period (800ms to 2400ms)
                            const nextBeatDelay = Math.random() * (2400 - 800) + 800;
                            setTimeout(createBoom, nextBeatDelay);
                        }
                    });
                }
            });
        }

        // Initialize the booming effect on load
        window.onload = createBoom;
    </script>
</body>
</html>
